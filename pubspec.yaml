name: smart_garage_gujarat
description: AI-Powered Automotive Ecosystem for Gujarat
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase Core & Services (Use compatible versions)
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  firebase_storage: ^12.4.0
  firebase_messaging: ^15.2.0
  firebase_analytics: ^11.4.0
  
  # State Management
  provider: ^6.1.2
  
  # UI & Design
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  lottie: ^3.3.1
  
  # Image & Media
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  
  # Networking
  http: ^1.2.2
  
  # Utilities
  intl: ^0.19.0
  shared_preferences: ^2.3.5
  url_launcher: ^6.3.1
  
  # Maps & Location
  google_maps_flutter: ^2.10.1
  geolocator: ^13.0.2
  
  # Local Storage
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5
  
  # Payment Integration (Optional)
  razorpay_flutter: ^1.3.7
  
  # ML & OCR (Optional)
  google_ml_kit: ^0.19.0
  
  # Permissions
  permission_handler: ^11.4.0
  
  # QR Code Scanner
  mobile_scanner: ^6.0.3
  
  # PDF Generation
  pdf: ^3.11.1
  printing: ^5.13.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  
  # Assets
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    # - assets/data/  # Commented out - remove this line if folder doesn't exist
  
  # Fonts (Optional - remove if you don't have Poppins fonts)
  # fonts:
  #   - family: Poppins
  #     fonts:
  #       - asset: assets/fonts/Poppins/Poppins-Regular.ttf
  #         weight: 400
  #       - asset: assets/fonts/Poppins/Poppins-Medium.ttf
  #           weight: 500
  #       - asset: assets/fonts/Poppins/Poppins-SemiBold.ttf
  #           weight: 600
  #       - asset: assets/fonts/Poppins/Poppins-Bold.ttf
  #           weight: 700
  #       - asset: assets/fonts/Poppins/Poppins-ExtraBold.ttf
  #           weight: 800